version: '3.8'

services:
  guandan:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guandan-arena
    ports:
      - "80:80"
    volumes:
      # SQLite 数据持久化 - 挂载到代码中硬编码的数据库路径
      - guandan-data:/app/packages/server/data
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  guandan-data:
    driver: local
